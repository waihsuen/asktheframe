version: "2.1"

services:
  wifi-connect:
    build: ./wifi-connect
    network_mode: "host"
    restart: always
    labels:
      io.balena.features.dbus: "1"
    cap_add:
      - NET_ADMIN
    environment:
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/host/run/dbus/system_bus_socket"

  balena-eink:
    build: .
    privileged: true
    restart: always
    devices:
      - "/dev/gpiomem"
      - "/dev/spidev0.0"
      - "/dev/spidev0.1"
